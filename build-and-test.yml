name: Build and Test

on:
  pull_request:
    branches: [ master, main ]
  push:
    branches: [ master, main ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore packages
      run: nuget restore TicTacToe.sln

    - name: Build solution
      run: msbuild TicTacToe.sln /p:Configuration=Release

    - name: Run tests
      run: |
        nuget install NUnit.ConsoleRunner -Version 3.16.3 -OutputDirectory testrunner
        testrunner\NUnit.ConsoleRunner.3.16.3\tools\nunit3-console.exe TicTacToe.Tests\bin\Release\TicTacToe.Tests.dll